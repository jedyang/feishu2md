# GitLab CI/CD configuration for feishu2md project

stages:
  # - test
  - build

variables:
  # Harbor repository settings
  HARBOR_REGISTRY: docker.cnb.cool  # 替换为你的Harbor仓库地址
  HARBOR_PROJECT: meyley/docker  # 替换为你的Harbor项目名称
  IMAGE_NAME: feishu2md
  HARBOR_USER: cnb  # 替换为你的Harbor用户名
  HARBOR_PASSWORD: 2Fk1199lQMwNyhtAQ3NW67XoK4B # 替换为你的Harbor密码
  IMAGE_TAG: ${CI_COMMIT_SHORT_SHA}
  FULL_IMAGE_NAME: ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/${IMAGE_NAME}:${IMAGE_TAG}
# Run tests
