# Build Docker image
build-and-push:
  stage: build
  image: ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/docker:24.0.5
  services:
    - name: ${HARBOR_REGISTRY}/${HARBOR_PROJECT}/docker:24.0.5-dind
      alias: docker
      variables:
        HEALTHCHECK_TCP_PORT: "2375"
  before_script:
    - docker info
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker build -t ${FULL_IMAGE_NAME} .
    - echo "Pushing image to Harbor..."
    - docker login -u ${HARBOR_USER} -p ${HARBOR_PASSWORD} ${HARBOR_REGISTRY}
    - docker push ${FULL_IMAGE_NAME}
  only:
    - main  # 只在main分支上构建和推送镜像